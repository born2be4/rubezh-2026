name: Sync participants

on:
  schedule:
    - cron: '0 * * * *'   # ежечасно
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Sync from Google Sheet
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY:           ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
        run: python scripts/sync_participants.py

      - name: Commit if changed
        run: |
          git config user.name  "rubezh-sync[bot]"
          git config user.email "rubezh-sync@users.noreply.github.com"
          if git diff --quiet src/data/participants.json; then
            echo "no changes"
          else
            git add src/data/participants.json
            git commit -m "chore: sync participants ($(date -u +%FT%TZ))"
            git push
          fi
